<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!--
    Token Proxy Logo v2
    设计理念：抽象的路由箭头 + T 字形，简洁有力
  -->
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- 左侧入口箭头 -->
  <path
    d="M8 40 L32 64 L8 88 L8 72 L20 64 L8 56 Z"
    fill="url(#g2)"
  />

  <!-- 右侧出口箭头 -->
  <path
    d="M120 40 L96 64 L120 88 L120 72 L108 64 L120 56 Z"
    fill="url(#g1)"
  />

  <!-- 中心 T 形：代表 Token -->
  <rect x="40" y="24" width="48" height="16" rx="4" fill="url(#g1)"/>
  <rect x="56" y="24" width="16" height="80" rx="4" fill="url(#g2)"/>

</svg>
