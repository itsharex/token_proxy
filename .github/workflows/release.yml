name: Release

on:
  workflow_run:
    workflows: ["Test"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 0.1.0)"
        required: true

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: 24
  PNPM_VERSION: 10.13.1

jobs:
  stable_tag:
    name: Tag release (main push)
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.release_guard.outputs.version }}
      tag: ${{ steps.create_tag.outputs.tag }}
      release_notes: ${{ steps.release_notes.outputs.release_body }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Release guard
        id: release_guard
        run: node scripts/release-guard.mjs

      - name: Abort if not a release commit
        if: steps.release_guard.outputs.is_release != 'true'
        run: |
          echo "Not a release commit; skip tag." && exit 0
        shell: bash

      - name: Resolve previous stable tag
        id: previous_tag
        if: steps.release_guard.outputs.is_release == 'true'
        run: |
          tags=$(git tag --list 'v*' --sort=v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || true)
          prev=$(echo "$tags" | tail -n 1)
          echo "previous_tag=$prev" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        id: create_tag
        if: steps.release_guard.outputs.is_release == 'true'
        run: |
          tag="v${{ steps.release_guard.outputs.version }}"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -a "$tag" -m "Release ${{ steps.release_guard.outputs.version }}"
          git push origin "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: release_notes
        if: steps.release_guard.outputs.is_release == 'true'
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.create_tag.outputs.tag }}
          PREVIOUS_TAG: ${{ steps.previous_tag.outputs.previous_tag }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const previousTag = process.env.PREVIOUS_TAG;
            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
            };
            if (previousTag) {
              params.previous_tag_name = previousTag;
            }
            const { data } = await github.rest.repos.generateReleaseNotes(params);
            core.setOutput("release_body", data.body ?? "");

  stable_release:
    name: Release (${{ matrix.platform }} / ${{ matrix.target }})
    needs: stable_tag
    if: needs.stable_tag.outputs.tag != ''
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-15-intel
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.stable_tag.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Ensure pnpm store directory exists
        run: node scripts/ensure-pnpm-store.mjs

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest' || matrix.platform == 'ubuntu-24.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"
          cache-on-failure: true
          # Stable cache key for release reuse; bump suffix to invalidate.
          shared-key: "rust-${{ runner.os }}-${{ matrix.target }}-v1"
          add-job-id-key: "false"
          add-rust-environment-hash-key: "false"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: "pnpm tauri"
          args: "--target ${{ matrix.target }}"
          tagName: "${{ needs.stable_tag.outputs.tag }}"
          releaseName: "Release ${{ needs.stable_tag.outputs.version }}"
          releaseBody: ${{ needs.stable_tag.outputs.release_notes }}
          prerelease: false
          generateReleaseNotes: false

  prepare_release_pr:
    name: Prepare release PR
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate and bump version
        id: versioning
        run: node scripts/versioning.mjs release "${{ inputs.version }}"

      - name: Create release branch and commit
        id: commit
        run: |
          version="${{ steps.versioning.outputs.version }}"
          branch="release/v${version}"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git fetch origin "$branch" || true
          git switch -C "$branch"
          git add package.json src-tauri/Cargo.toml src-tauri/tauri.conf.json src-tauri/Cargo.lock
          git commit -m "chore: release v${version}"
          git push --force-with-lease=refs/heads/$branch origin "HEAD:$branch"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        uses: actions/github-script@v7
        env:
          BRANCH: ${{ steps.commit.outputs.branch }}
          VERSION: ${{ steps.versioning.outputs.version }}
        with:
          script: |
            const branch = process.env.BRANCH;
            const version = process.env.VERSION;
            const title = `chore: release v${version}`;
            const body = [
              `## Release v${version}`,
              "- Auto-generated release PR; merging will tag and publish the final release.",
              "- Merge only after CI passes.",
            ].join("\n");
            const { data } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: branch,
              base: "main",
              title,
              body,
              maintainer_can_modify: true,
            });
            core.setOutput("pr_url", data.html_url);
