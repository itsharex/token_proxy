name: Release

on:
  workflow_run:
    workflows: ["Test"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 0.1.0)"
        required: true

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: 22
  PNPM_VERSION: 10.13.1

jobs:
  prerelease:
    name: Pre-release (${{ matrix.platform }} / ${{ matrix.target }})
    # 仅在 Test workflow 对 main 的 push 成功后触发预发布
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-15-intel
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Check latest tag freshness
        id: tag_guard
        uses: actions/github-script@v7
        with:
          script: |
            const THRESHOLD_MINUTES = 90;
            const { owner, repo } = context.repo;
            const query = `
              query ($owner: String!, $repo: String!) {
                repository(owner: $owner, name: $repo) {
                  refs(
                    refPrefix: "refs/tags/"
                    first: 1
                    orderBy: { field: TAG_COMMIT_DATE, direction: DESC }
                  ) {
                    nodes {
                      name
                      target {
                        __typename
                        ... on Commit {
                          committedDate
                        }
                        ... on Tag {
                          tagger {
                            date
                          }
                          target {
                            ... on Commit {
                              committedDate
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;
            const data = await github.graphql(query, { owner, repo });
            const nodes = data.repository.refs.nodes ?? [];
            if (nodes.length === 0) {
              core.info("No tags found; skip guard disabled.");
              core.setOutput("skip", "false");
              return;
            }
            const latest = nodes[0];
            const tagName = latest.name;
            const target = latest.target;
            let tagDate = null;
            if (target.__typename === "Commit") {
              tagDate = target.committedDate;
            } else if (target.__typename === "Tag") {
              tagDate = target.tagger?.date ?? target.target?.committedDate ?? null;
            }
            if (!tagDate) {
              core.info(`Latest tag ${tagName} has no date; skip guard disabled.`);
              core.setOutput("skip", "false");
              core.setOutput("latest_tag", tagName);
              return;
            }
            const diffMinutes = (Date.now() - new Date(tagDate).getTime()) / 60000;
            core.setOutput("latest_tag", tagName);
            core.setOutput("latest_tag_date", tagDate);
            core.setOutput("minutes_since", diffMinutes.toFixed(1));
            const skip = diffMinutes < THRESHOLD_MINUTES;
            core.info(`Latest tag ${tagName} at ${tagDate}; ${diffMinutes.toFixed(1)} minutes ago.`);
            core.setOutput("skip", skip ? "true" : "false");

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Detect release bump commit
        id: release_guard
        run: node scripts/release-guard.mjs

      - name: Install frontend dependencies
        if: steps.release_guard.outputs.skip != 'true' && steps.tag_guard.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Linux dependencies
        if: steps.release_guard.outputs.skip != 'true' && steps.tag_guard.outputs.skip != 'true' && (matrix.platform == 'ubuntu-22.04' || matrix.platform == 'ubuntu-22.04-arm')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Install Rust toolchain
        if: steps.release_guard.outputs.skip != 'true' && steps.tag_guard.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        if: steps.release_guard.outputs.skip != 'true' && steps.tag_guard.outputs.skip != 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"
          cache-on-failure: true
          # Stable cache key for prerelease/release reuse; bump suffix to invalidate.
          shared-key: "rust-${{ runner.os }}-${{ matrix.target }}-v1"
          add-job-id-key: "false"
          add-rust-environment-hash-key: "false"

      - name: Compute prerelease version
        id: versioning
        if: steps.release_guard.outputs.skip != 'true' && steps.tag_guard.outputs.skip != 'true'
        run: node scripts/versioning.mjs prerelease

      - name: Build and release
        if: steps.release_guard.outputs.skip != 'true' && steps.tag_guard.outputs.skip != 'true'
        uses: tauri-apps/tauri-action@v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: "pnpm tauri"
          args: "--target ${{ matrix.target }}"
          tagName: "${{ steps.versioning.outputs.tag }}"
          releaseName: "Pre-release ${{ steps.versioning.outputs.version }}"
          prerelease: true
          generateReleaseNotes: true

  test:
    # 手动发布时复用测试流程，保持质量闸门
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/test.yml

  prepare_release:
    name: Prepare release
    if: github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      version: ${{ steps.versioning.outputs.version }}
      tag: ${{ steps.versioning.outputs.tag }}
      release_notes: ${{ steps.release_notes.outputs.release_body }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate and bump version
        id: versioning
        run: node scripts/versioning.mjs release "${{ inputs.version }}"

      - name: Resolve previous stable tag
        id: previous_tag
        run: |
          # Use the latest stable tag (vX.Y.Z) as release notes base.
          tags=$(git tag --list 'v*' --sort=v:refname | grep -E '^v[0-9]+\\.[0-9]+\\.[0-9]+$' || true)
          prev=$(echo "$tags" | tail -n 1)
          echo "previous_tag=$prev" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package.json src-tauri/Cargo.toml src-tauri/tauri.conf.json src-tauri/Cargo.lock
          git commit -m "chore: release v${{ steps.versioning.outputs.version }}"
          git tag -a "${{ steps.versioning.outputs.tag }}" -m "Release ${{ steps.versioning.outputs.version }}"
          git push
          git push --tags

      - name: Generate release notes
        id: release_notes
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.versioning.outputs.tag }}
          PREVIOUS_TAG: ${{ steps.previous_tag.outputs.previous_tag }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const previousTag = process.env.PREVIOUS_TAG;
            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
            };
            if (previousTag) {
              params.previous_tag_name = previousTag;
            }
            const { data } = await github.rest.repos.generateReleaseNotes(params);
            core.setOutput("release_body", data.body ?? "");

  release:
    name: Release (${{ matrix.platform }} / ${{ matrix.target }})
    if: github.event_name == 'workflow_dispatch'
    needs: prepare_release
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-15-intel
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare_release.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'ubuntu-22.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"
          cache-on-failure: true
          # Stable cache key for prerelease/release reuse; bump suffix to invalidate.
          shared-key: "rust-${{ runner.os }}-${{ matrix.target }}-v1"
          add-job-id-key: "false"
          add-rust-environment-hash-key: "false"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: "pnpm tauri"
          args: "--target ${{ matrix.target }}"
          tagName: "${{ needs.prepare_release.outputs.tag }}"
          releaseName: "Release ${{ needs.prepare_release.outputs.version }}"
          releaseBody: ${{ needs.prepare_release.outputs.release_notes }}
          prerelease: false
          generateReleaseNotes: false
