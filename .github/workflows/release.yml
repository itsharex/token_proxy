name: Release

on:
  workflow_run:
    workflows: ["Test"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 0.1.0)"
        required: true

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: 24
  PNPM_VERSION: 10.13.1

jobs:
  stable_tag:
    name: Tag release (main push)
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.release_guard.outputs.version }}
      tag: ${{ steps.create_tag.outputs.tag }}
      release_notes: ${{ steps.release_notes.outputs.release_body }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Release guard
        id: release_guard
        run: node scripts/release-guard.mjs

      - name: Abort if not a release commit
        if: steps.release_guard.outputs.is_release != 'true'
        run: |
          echo "Not a release commit; skip tag." && exit 0
        shell: bash

      - name: Resolve previous stable tag
        id: previous_tag
        if: steps.release_guard.outputs.is_release == 'true'
        run: |
          tags=$(git tag --list 'v*' --sort=v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || true)
          prev=$(echo "$tags" | tail -n 1)
          echo "previous_tag=$prev" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        id: create_tag
        if: steps.release_guard.outputs.is_release == 'true'
        run: |
          tag="v${{ steps.release_guard.outputs.version }}"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -a "$tag" -m "Release ${{ steps.release_guard.outputs.version }}"
          git push origin "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: release_notes
        if: steps.release_guard.outputs.is_release == 'true'
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.create_tag.outputs.tag }}
          PREVIOUS_TAG: ${{ steps.previous_tag.outputs.previous_tag }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const previousTag = process.env.PREVIOUS_TAG;
            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
            };
            if (previousTag) {
              params.previous_tag_name = previousTag;
            }
            const { data } = await github.rest.repos.generateReleaseNotes(params);
            core.setOutput("release_body", data.body ?? "");

  stable_release:
    name: Release (${{ matrix.platform }} / ${{ matrix.target }})
    needs: stable_tag
    if: needs.stable_tag.outputs.tag != ''
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            node_arch: arm64
          - platform: macos-15-intel
            target: x86_64-apple-darwin
            node_arch: x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            node_arch: x64
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            node_arch: x64
          - platform: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            node_arch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.stable_tag.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          architecture: ${{ matrix.node_arch }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      # macos-latest 是 GitHub-hosted 的 Apple Silicon (arm64) runner；
      # 显式指定 Node 为 arm64，避免在 Rosetta/x64 Node 下导致 tauri/产物架构误判。
      - name: Verify macOS (arm64) runner & Node arch
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          echo "uname -m: $(uname -m)"
          echo "node process.arch: $(node -p 'process.arch')"
          if [ "$(uname -m)" != "arm64" ]; then
            echo "Expected macos-latest to be arm64 (Apple Silicon) runner." >&2
            exit 1
          fi
          if [ "$(node -p 'process.arch')" != "arm64" ]; then
            echo "Expected arm64 Node on macos-latest; otherwise tauri may run under Rosetta and produce wrong artifacts." >&2
            exit 1
          fi

      - name: Ensure pnpm store directory exists
        run: node scripts/ensure-pnpm-store.mjs

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest' || matrix.platform == 'ubuntu-24.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"
          cache-on-failure: true
          # Stable cache key for release reuse; bump suffix to invalidate.
          shared-key: "rust-${{ runner.os }}-${{ matrix.target }}-v1"
          add-job-id-key: "false"
          add-rust-environment-hash-key: "false"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: "pnpm tauri"
          args: "--target ${{ matrix.target }}"
          includeUpdaterJson: false
          tagName: "${{ needs.stable_tag.outputs.tag }}"
          releaseName: "Release ${{ needs.stable_tag.outputs.version }}"
          releaseBody: ${{ needs.stable_tag.outputs.release_notes }}
          prerelease: false
          generateReleaseNotes: false

      - name: Verify macOS (aarch64) updater assets uploaded
        if: matrix.target == 'aarch64-apple-darwin'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.stable_tag.outputs.tag }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          expected=(
            "Token.Proxy_aarch64.app.tar.gz"
            "Token.Proxy_aarch64.app.tar.gz.sig"
          )
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG_NAME}"

          for attempt in {1..12}; do
            names="$(
              curl -fsSL \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "$api" \
              | node -e 'const r=JSON.parse(require("fs").readFileSync(0,"utf8")); console.log((r.assets ?? []).map(a => a.name).join("\n"));'
            )"

            missing=()
            for name in "${expected[@]}"; do
              echo "$names" | grep -qx "$name" || missing+=("$name")
            done

            if [ ${#missing[@]} -eq 0 ]; then
              echo "All expected macOS (aarch64) updater assets are present."
              exit 0
            fi

            echo "Waiting for release assets: ${missing[*]} (attempt ${attempt}/12)"
            sleep 5
          done

          echo "Missing expected macOS (aarch64) updater assets after retries: ${missing[*]}" >&2
          exit 1

  stable_updater_json:
    name: Generate updater latest.json
    needs: [stable_tag, stable_release]
    if: needs.stable_tag.outputs.tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.stable_tag.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Generate and upload latest.json
        run: node scripts/generate-updater-json.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.stable_tag.outputs.tag }}

  prepare_release_pr:
    name: Prepare release PR
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate and bump version
        id: versioning
        run: node scripts/versioning.mjs release "${{ inputs.version }}"

      - name: Create release branch and commit
        id: commit
        run: |
          version="${{ steps.versioning.outputs.version }}"
          branch="release/v${version}"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git fetch origin "$branch" || true
          git switch -C "$branch"
          git add package.json src-tauri/Cargo.toml src-tauri/tauri.conf.json src-tauri/Cargo.lock
          git commit -m "chore: release v${version}"
          git push --force-with-lease=refs/heads/$branch origin "HEAD:$branch"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        uses: actions/github-script@v7
        env:
          BRANCH: ${{ steps.commit.outputs.branch }}
          VERSION: ${{ steps.versioning.outputs.version }}
        with:
          script: |
            const branch = process.env.BRANCH;
            const version = process.env.VERSION;
            const title = `chore: release v${version}`;
            const body = [
              `## Release v${version}`,
              "- Auto-generated release PR; merging will tag and publish the final release.",
              "- Merge only after CI passes.",
            ].join("\n");
            const { data } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: branch,
              base: "main",
              title,
              body,
              maintainer_can_modify: true,
            });
            core.setOutput("pr_url", data.html_url);
