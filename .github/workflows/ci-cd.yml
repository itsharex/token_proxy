name: CI-CD

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 0.1.0)"
        required: true

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: 22
  PNPM_VERSION: 10.13.1

jobs:
  test:
    name: Test (Rust)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"
          cache-on-failure: true

      - name: Run cargo test
        working-directory: src-tauri
        run: cargo test

  prerelease:
    name: Pre-release (${{ matrix.platform }} / ${{ matrix.target }})
    if: github.event_name == 'push'
    needs: test
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-15-intel
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Detect release bump commit
        id: release_guard
        run: |
          node -e "const fs=require('fs');const {execSync}=require('child_process');const msg=execSync('git log -1 --pretty=%s',{encoding:'utf8'}).trim();const skip=msg.startsWith('chore: release v');fs.appendFileSync(process.env.GITHUB_OUTPUT, `skip=${skip}\\n`);"

      - name: Install frontend dependencies
        if: steps.release_guard.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Linux dependencies
        if: steps.release_guard.outputs.skip != 'true' && matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust toolchain
        if: steps.release_guard.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        if: steps.release_guard.outputs.skip != 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"
          cache-on-failure: true

      - name: Compute prerelease version
        id: versioning
        if: steps.release_guard.outputs.skip != 'true'
        run: node scripts/versioning.mjs prerelease

      - name: Build and release
        if: steps.release_guard.outputs.skip != 'true'
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: "pnpm tauri"
          args: "--target ${{ matrix.target }}"
          tagName: "${{ steps.versioning.outputs.tag }}"
          releaseName: "Pre-release ${{ steps.versioning.outputs.version }}"
          prerelease: true
          generateReleaseNotes: true

  prepare_release:
    name: Prepare release
    if: github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      version: ${{ steps.versioning.outputs.version }}
      tag: ${{ steps.versioning.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate and bump version
        id: versioning
        run: node scripts/versioning.mjs release "${{ inputs.version }}"

      - name: Commit and tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package.json src-tauri/Cargo.toml src-tauri/tauri.conf.json src-tauri/Cargo.lock
          git commit -m "chore: release v${{ steps.versioning.outputs.version }}"
          git tag -a "${{ steps.versioning.outputs.tag }}" -m "Release ${{ steps.versioning.outputs.version }}"
          git push
          git push --tags

  release:
    name: Release (${{ matrix.platform }} / ${{ matrix.target }})
    if: github.event_name == 'workflow_dispatch'
    needs: prepare_release
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-15-intel
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare_release.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"
          cache-on-failure: true

      - name: Build and release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: "pnpm tauri"
          args: "--target ${{ matrix.target }}"
          tagName: "${{ needs.prepare_release.outputs.tag }}"
          releaseName: "Release ${{ needs.prepare_release.outputs.version }}"
          prerelease: false
          generateReleaseNotes: true
